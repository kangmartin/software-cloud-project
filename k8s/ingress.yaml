apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: library-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: library.local
    http:
      paths:

      - path: /books
        pathType: Prefix
        backend:
          service:
            name: book-service
            port:
              number: 80

      - path: /
        pathType: Prefix
        backend:
          service:
            name: front-service
            port:
              number: 80